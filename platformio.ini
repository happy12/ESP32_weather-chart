
; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = 
	esp32_exception_decoder
	default
	time
upload_protocol = esptool
upload_speed = 1500000
board_build.filesystem = littlefs
board_build.flash_mode = dio
platform_packages = 
	tool-esptoolpy
	tool-mklittlefs
board_build.f_flash = 80000000L
board_build.f_cpu = 240000000L
build_flags =
    -DCORE_DEBUG_LEVEL=0
	-O2
    ; Reduce mbedTLS TLS record buffers to cut heap fragmentation.
    ; Default: 16 KB recv + 4 KB send = 20 KB held per TLS connection.
    ; 4 KB recv handles typical HTTPS record sizes from WeatherAPI CDN.
    ; 1 KB send is sufficient for a short HTTP GET request header.
    -DMBEDTLS_SSL_IN_CONTENT_LEN=4096
    -DMBEDTLS_SSL_OUT_CONTENT_LEN=1024
board_upload.erase_flash = false
lib_ldf_mode = chain
lib_ignore = 
	RPAsyncTCP
	ESPAsyncTCP
lib_extra_dirs = 
	C:\Users\Mathieu\Documents\Arduino\libraries\Mathieu_util
	C:\Users\Mathieu\Documents\Arduino\libraries\Mathieu_NeoPixel
lib_deps = 
	esp32async/ESPAsyncWebServer@*
	esp32async/AsyncTCP@*
	bblanchon/ArduinoJson@*
	adafruit/Adafruit NeoPixel@*
